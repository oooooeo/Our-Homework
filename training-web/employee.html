<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>员工培训任务</title>
  <link rel="stylesheet" href="./styles.css?v=20260611-feedback">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">T</div>
        <div>
          <div class="brand-title">培训进度</div>
          <div class="brand-subtitle">员工学习管理</div>
        </div>
      </div>

      <nav class="nav-tabs" aria-label="主导航">
        <a class="nav-tab is-active" href="./employee.html">
          <span class="nav-icon">✓</span>
          员工端
        </a>
      </nav>
    </aside>

    <main class="main">
      <header class="page-head">
        <div>
          <h1>员工培训任务</h1>
          <p class="page-meta">完成分配给当前账号的培训任务。</p>
        </div>
        <div class="employee-head-actions">
          <button class="feedback-entry-btn" type="button" id="feedbackOpenBtn">
            <span class="feedback-entry-icon">↗</span>
            <span>
              <strong>反馈</strong>
              <small>满意 / 不满意 / 建议</small>
            </span>
          </button>
          <label class="select-field">
            <span>当前用户</span>
            <div class="session-box">
              <strong id="currentUsername">未登录</strong>
              <button class="small-btn" type="button" id="logoutBtn">退出</button>
            </div>
          </label>
        </div>
      </header>

      <div class="system-notice" id="databaseNotice" hidden></div>

      <section class="employee-summary" aria-label="员工培训进度">
        <div class="metric">
          <span class="metric-label">已完成</span>
          <strong id="employeeDone">0/0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">完成率</span>
          <strong id="employeePercent">0%</strong>
        </div>
        <div class="metric wide">
          <span class="metric-label">当前进度</span>
          <div class="progress-track">
            <div class="progress-fill" id="employeeProgress"></div>
          </div>
        </div>
      </section>

      <section class="notification-panel" aria-label="任务提醒">
        <div class="section-head">
          <h2>任务提醒</h2>
        </div>
        <div class="notification-list" id="notificationList"></div>
      </section>

      <div class="content-grid">
        <section class="panel task-panel">
          <div class="section-head">
            <h2 id="taskPanelTitle">必修任务</h2>
            <div class="segmented-control" aria-label="任务范围">
              <button class="segment-btn is-active" type="button" data-task-mode="required">必修任务</button>
              <button class="segment-btn" type="button" data-task-mode="square">学习广场</button>
            </div>
          </div>
          <div class="task-list" id="taskList"></div>
        </section>

        <section class="panel article-panel">
          <div class="section-head">
            <h2 id="articleTitle">培训文章</h2>
            <span class="status-pill" id="articleStatus">未选择</span>
          </div>
          <article class="article-body" id="articleBody"></article>
          <div class="article-actions">
            <button class="primary-btn" type="button" id="completeTaskBtn" disabled>
              <span>✓</span>
              标记完成
            </button>
          </div>
          <section class="comment-panel" aria-label="任务评论区">
            <div class="section-head compact">
              <h2>评论区</h2>
              <span class="comment-count" id="commentCount">0 条</span>
            </div>
            <div class="comment-list" id="commentList"></div>
            <form class="comment-form" id="commentForm">
              <textarea id="commentBody" rows="3" placeholder="输入你的讨论内容..." required></textarea>
              <div class="form-message" id="commentMessage" aria-live="polite"></div>
              <button class="primary-btn" type="submit">
                <span>↵</span>
                发送评论
              </button>
            </form>
          </section>
        </section>
      </div>
    </main>
  </div>

  <div class="feedback-drawer" id="feedbackDrawer" hidden>
    <div class="feedback-backdrop" data-feedback-close></div>
    <section class="feedback-panel" aria-label="反馈">
      <div class="feedback-panel-head">
        <div>
          <h2>反馈</h2>
          <p>选择反馈类型，提交后会同步保存。</p>
        </div>
        <button class="small-btn" type="button" data-feedback-close>关闭</button>
      </div>

      <div class="feedback-options" id="feedbackOptions">
        <button class="feedback-option is-active" type="button" data-feedback-type="like">
          <span class="feedback-face">☺</span>
          <span>
            <strong>我喜欢一些内容</strong>
            <small>感谢你的反馈，我们会保留有效做法。</small>
          </span>
        </button>
        <button class="feedback-option" type="button" data-feedback-type="dislike">
          <span class="feedback-face">☹</span>
          <span>
            <strong>我不喜欢一些内容</strong>
            <small>告诉我们问题，方便后续修复。</small>
          </span>
        </button>
        <button class="feedback-option" type="button" data-feedback-type="suggestion">
          <span class="feedback-face">✎</span>
          <span>
            <strong>我有一个建议</strong>
            <small>对功能或体验的想法都可以写下来。</small>
          </span>
        </button>
      </div>

      <form class="feedback-form" id="feedbackForm">
        <label>
          <span>反馈内容</span>
          <textarea id="feedbackBody" rows="4" placeholder="请写下你的具体反馈..." required></textarea>
        </label>
        <label>
          <span>关联任务</span>
          <select id="feedbackTask"></select>
        </label>
        <div class="form-message" id="feedbackMessage" aria-live="polite"></div>
        <button class="primary-btn" type="submit">
          <span>↵</span>
          提交反馈
        </button>
      </form>
    </section>
  </div>

  <script src="./app.js?v=20260611-feedback"></script>
  <script src="./employee.js?v=20260611-feedback"></script>
</body>
</html>
