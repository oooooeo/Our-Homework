<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>培训后台主页</title>
  <link rel="stylesheet" href="./styles.css?v=20260611-admin-summary-fix">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">T</div>
        <div>
          <div class="brand-title">培训进度</div>
          <div class="brand-subtitle">员工学习管理</div>
        </div>
      </div>

      <nav class="nav-tabs" aria-label="主导航">
        <a class="nav-tab is-active" href="./admin.html">
          <span class="nav-icon">▦</span>
          后台
        </a>
      </nav>
    </aside>

    <main class="main">
      <header class="page-head">
        <div>
          <h1>后台主页</h1>
          <p class="page-meta">实时查看员工培训完成情况。</p>
        </div>
        <div class="session-box">
          <strong id="currentUsername">supermanager</strong>
          <button class="small-btn" type="button" id="logoutBtn">退出</button>
        </div>
      </header>

      <div class="system-notice" id="databaseNotice" hidden></div>

      <section class="admin-summary" aria-label="后台总体进度">
        <div class="metric">
          <span class="metric-label">员工数</span>
          <strong id="employeeCount">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">任务数</span>
          <strong id="taskCount">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">完成记录</span>
          <strong id="completionCount">0</strong>
        </div>
        <div class="metric wide">
          <span class="metric-label">总体进度</span>
          <div class="progress-track">
            <div class="progress-fill" id="overallProgress"></div>
          </div>
        </div>
        <a class="metric inbox-entry" href="#feedbackInbox">
          <span class="metric-label">意见箱</span>
          <strong id="feedbackCount">0</strong>
          <small>查看员工反馈</small>
        </a>
        <a class="metric inbox-entry" href="#questionInbox">
          <span class="metric-label">公开问题</span>
          <strong id="questionCount">0</strong>
          <small>回复员工提问</small>
        </a>
      </section>

      <div class="admin-grid">
        <section class="panel">
          <div class="section-head">
            <h2>员工进度</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>员工</th>
                  <th>部门</th>
                  <th>完成</th>
                  <th>进度</th>
                  <th>最近完成</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="employeeRows"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <div class="section-head">
            <h2>任务完成率</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>任务</th>
                  <th>类型</th>
                  <th>目标部门</th>
                  <th>截止时间</th>
                  <th>完成率</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="taskRows"></tbody>
            </table>
          </div>
        </section>
      </div>

      <div class="admin-grid lower">
        <section class="panel">
          <div class="section-head">
            <h2>新增培训任务</h2>
          </div>
          <form class="task-form" id="taskForm">
            <label>
              <span>任务名称</span>
              <input id="newTaskTitle" type="text" autocomplete="off" required>
            </label>
            <label>
              <span>完成截止时间</span>
              <input id="newTaskDueAt" type="datetime-local">
            </label>
            <fieldset class="department-fieldset">
              <legend>目标部门</legend>
              <div class="department-options" id="newTaskDepartments"></div>
            </fieldset>
            <label>
              <span>培训文章</span>
              <textarea id="newTaskContent" rows="7" required></textarea>
            </label>
            <div class="form-message" id="taskFormMessage" aria-live="polite"></div>
            <button class="primary-btn" type="submit">
              <span>+</span>
              新增任务
            </button>
          </form>
        </section>

        <section class="panel">
          <div class="section-head">
            <h2>最近完成</h2>
          </div>
          <div class="recent-list" id="recentList"></div>
        </section>
      </div>

      <section class="panel feedback-inbox-panel" id="feedbackInbox">
        <div class="section-head">
          <h2>意见箱</h2>
          <span class="comment-count" id="feedbackInboxCount">0 条反馈</span>
        </div>
        <div class="feedback-inbox-list" id="feedbackRows"></div>
      </section>

      <section class="panel question-inbox-panel" id="questionInbox">
        <div class="section-head">
          <h2>公开问题</h2>
          <span class="comment-count" id="questionInboxCount">0 个问题</span>
        </div>
        <div class="form-message panel-message" id="questionFormMessage" aria-live="polite"></div>
        <div class="question-inbox-list" id="questionRows"></div>
      </section>
    </main>
  </div>

  <script src="./app.js?v=20260611-admin-summary-fix"></script>
  <script src="./admin.js?v=20260611-admin-summary-fix"></script>
</body>
</html>
