<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>员工培训进度系统入口</title>
  <link rel="stylesheet" href="./styles.css?v=20260611-admin-summary-fix">
</head>
<body>
  <div class="portal-shell">
    <main class="portal-main">
      <section class="portal-auth-card" id="authCard" data-mode="login" aria-label="系统入口">
        <div class="portal-auth-banner">
          <div class="brand portal-brand">
            <div class="brand-mark">T</div>
            <div>
              <div class="brand-title">培训进度</div>
              <div class="brand-subtitle">员工学习管理</div>
            </div>
          </div>
        </div>

        <div class="portal-auth-body">
          <form class="auth-form" id="loginForm" data-auth-form="login">
            <div class="auth-title">
              <h1>账号登录</h1>
              <p>员工和后台使用同一个入口。</p>
            </div>

            <label class="auth-field">
              <span>用户名</span>
              <input id="loginUsername" type="text" autocomplete="username" required>
            </label>

            <label class="auth-field">
              <span>密码</span>
              <span class="password-field">
                <input id="loginPassword" type="password" autocomplete="current-password" required>
                <button class="password-toggle" type="button" data-toggle-password aria-label="显示密码" aria-controls="loginPassword">
                  <span class="eye-icon" aria-hidden="true"></span>
                </button>
              </span>
            </label>

            <button class="primary-btn portal-submit" type="submit">
              <span data-button-label>登录</span>
            </button>
          </form>

          <form class="auth-form" id="registerForm" data-auth-form="register" hidden>
            <div class="auth-title">
              <h1>注册账号</h1>
              <p>用户名注册后不可重复。</p>
            </div>

            <label class="auth-field">
              <span>用户名</span>
              <input id="registerUsername" type="text" autocomplete="username" placeholder="2-32 位小写字母/数字" required>
            </label>

            <label class="auth-field">
              <span>部门</span>
              <select id="registerDepartment" required>
                <option value="人力资源部">人力资源部</option>
                <option value="财务部">财务部</option>
                <option value="市场部">市场部</option>
                <option value="销售部">销售部</option>
                <option value="技术部">技术部</option>
                <option value="运营部">运营部</option>
              </select>
            </label>

            <label class="auth-field">
              <span>密码</span>
              <span class="password-field">
                <input id="registerPassword" type="password" autocomplete="new-password" minlength="6" required>
                <button class="password-toggle" type="button" data-toggle-password aria-label="显示密码" aria-controls="registerPassword">
                  <span class="eye-icon" aria-hidden="true"></span>
                </button>
              </span>
            </label>

            <button class="primary-btn portal-submit" type="submit">
              <span data-button-label>注册并进入</span>
            </button>
          </form>

          <div class="form-message portal-message" id="loginMessage" aria-live="polite"></div>

          <div class="auth-switch" id="registerSwitch">
            <button class="link-btn" type="button" id="showRegisterBtn">注册账号</button>
          </div>

          <div class="auth-switch" id="loginSwitch" hidden>
            <span>已有账号</span>
            <button class="link-btn" type="button" id="showLoginBtn">返回登录</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js?v=20260611-admin-summary-fix"></script>
  <script src="./portal.js?v=20260611-admin-summary-fix"></script>
</body>
</html>
