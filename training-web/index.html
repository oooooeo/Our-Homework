<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>员工培训进度系统入口</title>
  <link rel="stylesheet" href="./styles.css?v=20260609-auth">
</head>
<body>
  <div class="portal-shell">
    <main class="portal-main">
      <div class="brand portal-brand">
        <div class="brand-mark">T</div>
        <div>
          <div class="brand-title">培训进度</div>
          <div class="brand-subtitle">员工学习管理</div>
        </div>
      </div>

      <section class="portal-hero">
        <h1>员工培训进度系统</h1>
        <p>首次进入请设置唯一用户名；之后凭用户名继续进入系统。</p>
      </section>

      <section class="portal-login" aria-label="登录注册">
        <form class="login-form" id="loginForm">
          <label>
            <span>用户名</span>
            <input id="usernameInput" type="text" autocomplete="username" placeholder="例如 zhangsan" required>
          </label>
          <button class="primary-btn" type="submit">
            <span>→</span>
            进入系统
          </button>
        </form>
        <div class="form-message" id="loginMessage" aria-live="polite"></div>
        <p class="login-note">普通用户名进入员工端；用户名为 supermanager 时进入后台端。</p>
      </section>
    </main>
  </div>

  <script src="./app.js?v=20260609-auth"></script>
  <script src="./portal.js?v=20260609-auth"></script>
</body>
</html>
